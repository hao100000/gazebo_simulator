can_to_gazebo:
  ros__parameters:
    motors:
      - can_id: 1
        joint_name: motor_1
        invert: false
        control_type: velocity

controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    # センサーの値を/joint_statesに返すコントローラー
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 指示値をモーター(joint)に送るコントローラー
    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController


forward_velocity_controller:
  ros__parameters:
    joints:
      - motor_1
