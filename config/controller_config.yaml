controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel_front_left_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    wheel_front_right_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    wheel_rear_left_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    wheel_rear_right_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController


# ============================================================
# コントローラの設定 (各ホイールに対する JointGroupVelocityController を使用)
# ============================================================
wheel_front_left_velocity_controller:
  ros__parameters:
    joints: ['wheel_front_left_joint']

wheel_front_right_velocity_controller:
  ros__parameters:
    joints: ['wheel_front_right_joint']

wheel_rear_left_velocity_controller:
  ros__parameters:
    joints: ['wheel_rear_left_joint']

wheel_rear_right_velocity_controller:
  ros__parameters:
    joints: ['wheel_rear_right_joint']
# CAN to Gazebo conversion settings moved to separate can_motor_map.yaml
# See can_motor_map.yaml for CAN ID to joint name mapping
