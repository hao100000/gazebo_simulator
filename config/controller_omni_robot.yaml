controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    # センサーの値を/joint_statesに返すコントローラー
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 指示値をモーター(joint)に送るコントローラー
    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController


forward_velocity_controller:
  ros__parameters:
    joints:
      - wheel0_motor_shaft_joint
      - wheel1_motor_shaft_joint
      - wheel2_motor_shaft_joint
      - wheel3_motor_shaft_joint
